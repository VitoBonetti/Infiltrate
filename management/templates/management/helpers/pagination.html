{% if page_obj.has_other_pages %}
<div class="card-footer border-top border-dark">
    <nav aria-label="Page navigation">
        <ul class="pagination pagination-sm justify-content-center mb-0" data-bs-theme="light">
            {% if page_obj.has_previous %}
                <li class="page-item">
                    <a class="page-link text-dark bg-transparent border-dark" href="?page={{ page_obj.previous_page_number }}{% if search_query %}&search={{ search_query }}{% endif %}{% if sort_by %}&sort={{ sort_by }}{% endif %}{% if market_filter %}&market={{ market_filter }}{% endif %}">
                        <i class="bi bi-chevron-left small"></i> Prev
                    </a>
                </li>
            {% else %}
                <li class="page-item disabled">
                    <span class="page-link bg-transparent border-dark text-secondary"><i class="bi bi-chevron-left small"></i> Prev</span>
                </li>
            {% endif %}

            <li class="page-item active">
                <span class="page-link sub-navbar border-dark fw-bold">
                    Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}
                </span>
            </li>

            {% if page_obj.has_next %}
                <li class="page-item">
                    <a class="page-link text-dark bg-transparent border-dark" href="?page={{ page_obj.next_page_number }}{% if search_query %}&search={{ search_query }}{% endif %}{% if sort_by %}&sort={{ sort_by }}{% endif %}{% if market_filter %}&market={{ market_filter }}{% endif %}">
                        Next <i class="bi bi-chevron-right small"></i>
                    </a>
                </li>
            {% else %}
                <li class="page-item disabled">
                    <span class="page-link bg-transparent border-dark text-secondary">Next <i class="bi bi-chevron-right small"></i></span>
                </li>
            {% endif %}
        </ul>
    </nav>
</div>
{% endif %}
